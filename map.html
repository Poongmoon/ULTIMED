<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>근처 병원 보기</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map {
            height: 100vh;
            width: 100%;
        }
        .info-window {
            text-align: center;
        }
        .info-window button {
            padding: 10px;
            background-color: #1E90FF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>근처 병원 보기 및 예약</h1>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // 지도 생성 및 기본 위치 설정
        const map = L.map('map').setView([37.5665, 126.9780], 13); // 서울 중심 좌표

        // OpenStreetMap 타일 추가
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 사용자 위치 가져오기 및 주변 병원 검색
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(position) {
                const userLocation = [position.coords.latitude, position.coords.longitude];
                map.setView(userLocation, 13); // 사용자의 위치로 지도 이동
                
                // 사용자 위치에 마커 추가
                L.marker(userLocation).addTo(map)
                    .bindPopup("현재 위치")
                    .openPopup();

                // 임시 데이터로 주변 병원 목록 표시
                const hospitals = [
                    { name: '서울 중앙 병원', lat: 37.5651, lng: 126.9780, address: '서울특별시 중구' },
                    { name: '강남 종합 병원', lat: 37.4979, lng: 127.0276, address: '서울특별시 강남구' },
                    { name: '동대문 병원', lat: 37.5743, lng: 127.0124, address: '서울특별시 동대문구' }
                ];

                // 병원마다 마커 추가
                hospitals.forEach(hospital => {
                    const marker = L.marker([hospital.lat, hospital.lng]).addTo(map);
                    marker.bindPopup(`
                        <div class="info-window">
                            <h3>${hospital.name}</h3>
                            <p>${hospital.address}</p>
                            <button onclick="window.location.href='https://www.google.com/search?q=${hospital.name}+예약'">예약하기</button>
                        </div>
                    `);
                });
            }, function() {
                alert("위치 정보를 가져올 수 없습니다.");
            });
        } else {
            alert("이 브라우저에서는 위치 정보를 지원하지 않습니다.");
        }
    </script>
</body>
</html>
