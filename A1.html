<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT 테스트</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        #response-container {
            margin-top: 20px;
            padding: 20px;
            background-color: #222;
            border-radius: 10px;
            min-height: 100px;
        }

        .loading {
            display: none;
            color: #1E90FF;
            font-size: 1.2em;
        }

        button {
            padding: 10px 20px;
            background-color: #1E90FF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
        }

        button:hover {
            background-color: #4682B4;
        }
    </style>
</head>
<body>
    <h1>GPT 테스트</h1>

    <button onclick="testGPT()">GPT 작동 확인</button>

    <div id="response-container"></div>

    <div class="loading" id="loading">GPT가 작동 중입니다...</div>

    <script>
        const BACKEND_URL = 'https://ultimed-xuqxec203-kim-si-hyeons-projects.vercel.app/';  // 백엔드 서버 URL 입력

        async function testGPT() {
            const responseContainer = document.getElementById('response-container');
            const loadingIndicator = document.getElementById('loading');
            responseContainer.innerText = '';
            loadingIndicator.style.display = 'block';

            try {
                const response = await fetch(`${BACKEND_URL}/api/gpt`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: "안녕하세요, GPT 테스트입니다." }) // 테스트용 프롬프트
                });

                const data = await response.json();
                responseContainer.innerText = data.answer;
            } catch (error) {
                responseContainer.innerText = '오류 발생. 다시 시도해 주세요.';
                console.error('Error:', error);
            } finally {
                loadingIndicator.style.display = 'none';
            }
        }
    </script>
</body>
</html>
