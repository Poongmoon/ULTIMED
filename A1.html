<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A1 - GPT 진단 및 해결 방법</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .response-container {
            margin-top: 20px;
            padding: 20px;
            background-color: #222;
            border-radius: 10px;
        }

        .loading {
            display: none;
            color: #1E90FF;
            font-size: 1.2em;
        }

        .hospital-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #1E90FF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1.2em;
        }

        .hospital-btn:hover {
            background-color: #4682B4;
        }

        .disclaimer {
            margin-top: 40px;
            font-size: 0.8em;
            color: #bbb;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <h1>GPT 진단 및 해결 방법</h1>

    <div class="loading" id="loading">GPT가 진단 중입니다...</div>
    <div class="response-container" id="response-container"></div>

    <!-- 근처 병원 보기 버튼 -->
    <button class="hospital-btn" onclick="location.href='map.html'">근처 병원 보기</button>

    <!-- 안내 문구 추가 -->
    <div class="disclaimer">
        위 정보는, 사용자의 단편적인 정보, 그리고 AI와 의료 정보를 기반으로 구성한 내용이기 때문에 정보의 정확성, 전문성, 신뢰성이 다소 떨어질 수 있습니다. 정확한 의료적 진단을 원하신다면 병원에 방문해주세요.
    </div>

    <script>
        // URL에서 전달받은 파라미터 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const name = urlParams.get('name');
        const age = urlParams.get('age');
        const body = urlParams.get('body');
        const bodyDetail = urlParams.get('body_detail');
        const how = urlParams.get('how');
        const detail = urlParams.get('detail');

        // GPT에게 전달할 질문 생성
        const gptPrompt = `안녕, 나에게 인사해줘`;

        // Vercel에 배포된 백엔드 서버 URL (Vercel에서 배포된 URL을 넣습니다)
        const BACKEND_URL = 'https://kim-si-hyeons-projects/ultimed-insaneapi.vercel.app';

        // GPT API 요청 함수
        async function fetchGPTResponse(prompt) {
            document.getElementById('loading').style.display = 'block';
            try {
                const response = await fetch(`${BACKEND_URL}/api/gpt`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ prompt: prompt }),
                });
                const data = await response.json();
                document.getElementById('response-container').innerText = data.answer;
            } catch (error) {
                document.getElementById('response-container').innerText = '진단 중 오류가 발생했습니다. 다시 시도해 주세요.';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // 페이지가 로드되면 GPT 질문을 보내기
        window.onload = function() {
            fetchGPTResponse(gptPrompt);
        };
    </script>
</body>
</html>
